# Nixpacks configuration for AppiFood Monorepo
# This file is at the root and manages the Backend (Laravel) environment.

[phases.setup]
nixPkgs = [
    "php82", 
    "php82Extensions.pdo", 
    "php82Extensions.pdo_mysql", 
    "php82Extensions.mbstring", 
    "php82Extensions.tokenizer", 
    "php82Extensions.xml", 
    "php82Extensions.ctype", 
    "php82Extensions.bcmath", 
    "php82Extensions.fileinfo", 
    "php82Extensions.curl", 
    "php82Packages.composer", 
    "openssl"
]

[phases.install]
cmds = ["if [ -d Backend ]; then cd Backend && composer install --no-dev --optimize-autoloader --no-interaction; fi"]

[phases.build]
cmds = [
  "if [ -d Backend ]; then cd Backend && php artisan config:cache && php artisan route:cache && php artisan storage:link; fi"
]

[start]
cmd = "if [ -d Backend ]; then cd Backend && php artisan migrate --force && php -S 0.0.0.0:${PORT:-8080} -t public/ public/index.php; else echo 'Backend directory not found'; exit 1; fi"
