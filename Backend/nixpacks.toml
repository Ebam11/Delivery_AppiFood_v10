# Nixpacks configuration for AppiFood Backend
# Disabling the default PHP provider to avoid the buggy auto-detection of 'composer'.

[providers]
php = { active = false }

[phases.setup]
nixPkgs = [
    "php82", 
    "php82Extensions.pdo", 
    "php82Extensions.pdo_mysql", 
    "php82Extensions.mbstring", 
    "php82Extensions.tokenizer", 
    "php82Extensions.xml", 
    "php82Extensions.ctype", 
    "php82Extensions.bcmath", 
    "php82Extensions.fileinfo", 
    "php82Extensions.curl", 
    "php82Packages.composer", 
    "openssl"
]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-interaction"]

[phases.build]
cmds = [
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan storage:link"
]

[start]
cmd = "php artisan migrate --force && php -S 0.0.0.0:${PORT:-8080} -t public/ public/index.php"
